name: Stealth Render Pinger

on:
  schedule:
    # This triggers the "Action" roughly every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # This adds a "Run" button so you can test it manually

jobs:
  ping-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Random YAML Delay
        # Random sleep between 1 and 240 seconds (4 minutes)
        run: sleep $(( ( RANDOM % 240 )  + 1 ))

      - name: Execute Pinger Script
        env:
          # This pulls your URL from GitHub Secrets safely
          RENDER_URL: ${{ secrets.RENDER_URL }} 
        run: python pinger.py
