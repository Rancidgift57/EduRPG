version: '3.9'
services:
  frontend:
    build: ./frontend
    ports: ['3000:3000']
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  backend:
    build: ./backend
    ports: ['8000:8000']
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/edurpg
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on: [postgres, redis, mongo]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: edurpg
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes: ['pgdata:/var/lib/postgresql/data']

  mongo:
    image: mongo:7
    ports: ['27017:27017']

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

volumes:
  pgdata:
