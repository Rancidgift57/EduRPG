name: Render Keep Alive

on:
  schedule:
    # Triggering every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/python-version@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Randomize Start Time
        # This bash command sleeps for a random time between 0 and 300 seconds
        run: sleep $(( ( RANDOM % 300 )  + 1 ))

      - name: Run Pinger
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }} # Using secrets for safety
        run: python pinger.py
